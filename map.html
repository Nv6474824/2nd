<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Campus - Map</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="main-content">
    <div class="page-container" style="padding-bottom: 0;">
      <div style="margin-bottom: 1rem;">
        <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Interactive Campus Map</h1>
        <p style="color: var(--color-text-muted);">Find resources, check busyness, and navigate the campus.</p>
      </div>

      <div class="glass-panel map-container">
        <div class="map-sidebar">
          <input type="text" placeholder="Search locations..." style="width: 100%; padding: 0.75rem; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--color-border); color: white; margin-bottom: 1rem;">
          
          <h4 style="font-size: 0.75rem; text-transform: uppercase; color: var(--color-text-muted); margin-bottom: 0.5rem;">Categories</h4>
          <div style="display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem;">
            <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem;"><input type="checkbox" checked> Academic Buildings</label>
            <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem;"><input type="checkbox" checked> Libraries</label>
            <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem;"><input type="checkbox" checked> Sports Facilities</label>
            <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem;"><input type="checkbox" checked> Cafeterias</label>
          </div>

          <h4 style="font-size: 0.75rem; text-transform: uppercase; color: var(--color-text-muted); margin-bottom: 0.5rem;">Popular Locations</h4>
          <div style="display: flex; flex-direction: column; gap: 0.5rem;">
            <div style="padding: 0.75rem; background: rgba(255,255,255,0.02); border-radius: 8px; cursor: pointer;">
              <div style="font-weight: 500; font-size: 0.875rem;">Main Library</div>
              <div style="font-size: 0.75rem; color: var(--color-success);">Low Traffic</div>
            </div>
            <div style="padding: 0.75rem; background: rgba(255,255,255,0.02); border-radius: 8px; cursor: pointer;">
              <div style="font-weight: 500; font-size: 0.875rem;">Student Center</div>
              <div style="font-size: 0.75rem; color: var(--color-danger);">High Traffic</div>
            </div>
            <div style="padding: 0.75rem; background: rgba(255,255,255,0.02); border-radius: 8px; cursor: pointer;">
              <div style="font-weight: 500; font-size: 0.875rem;">Engineering Block</div>
              <div style="font-size: 0.75rem; color: var(--color-warning);">Moderate Traffic</div>
            </div>
          </div>
        </div>
        <div class="map-area">
          <!-- Simulated Map Elements -->
          <div style="position: absolute; top: 20%; left: 30%; width: 120px; height: 80px; background: rgba(99, 102, 241, 0.2); border: 2px solid var(--color-primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; cursor: pointer; transition: transform 0.2s;">
            Main Library
            <div style="position: absolute; top: -5px; right: -5px; width: 12px; height: 12px; background: var(--color-success); border-radius: 50%; border: 2px solid #0a0c10;"></div>
          </div>
          
          <div style="position: absolute; top: 50%; left: 60%; width: 150px; height: 100px; background: rgba(168, 85, 247, 0.2); border: 2px solid var(--color-secondary); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; cursor: pointer; transition: transform 0.2s;">
            Student Center
            <div style="position: absolute; top: -5px; right: -5px; width: 12px; height: 12px; background: var(--color-danger); border-radius: 50%; border: 2px solid #0a0c10;"></div>
          </div>

          <div style="position: absolute; top: 70%; left: 20%; width: 100px; height: 100px; background: rgba(16, 185, 129, 0.2); border: 2px solid var(--color-success); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; cursor: pointer; transition: transform 0.2s;">
            Sports Complex
            <div style="position: absolute; top: 10px; right: 10px; width: 12px; height: 12px; background: var(--color-warning); border-radius: 50%; border: 2px solid #0a0c10;"></div>
          </div>

          <!-- User Location Marker -->
          <div style="position: absolute; top: 40%; left: 45%; width: 20px; height: 20px; background: white; border-radius: 50%; border: 4px solid var(--color-primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.3); z-index: 10;"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
